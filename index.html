<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クオリティファミリー VISION</title>
<meta name="robots" content="noindex, nofollow">
<style>
  *{ box-sizing: border-box; }

  body{
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #17181c;
    padding: 24px;
  }

  .frame{
    max-width: 1100px;
    width: 100%;
  }

  .frame img{
    display: block;
    width: 100%;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
  <div class="frame">
    <img src="vision.png" alt="クオリティファミリー VISION">
  </div>
</body>
</html>
